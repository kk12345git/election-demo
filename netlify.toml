[build]
  # No build command needed for this static HTML project
  command = ""
  
  # The directory to publish (current root)
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true
